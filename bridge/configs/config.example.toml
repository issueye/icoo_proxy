host = "127.0.0.1"
port = 18181
read_timeout_seconds = 15
write_timeout_seconds = 300
stream_preflight_timeout_seconds = 30
shutdown_timeout_seconds = 10
allow_local_without_auth = true
default_max_tokens = 32768
max_request_body_bytes = 67108864
data_dir = ".data"
db_path = ".data/icoo_llm_bridge.db"
traffic_db_path = ".data/icoo_llm_bridge_traffic.db"

[log]
chain_log_path = ".data/bridge-chain.log"
chain_log_bodies = false
chain_log_max_body_bytes = 8192

[archive]
enabled = false
down_request_dir = ".data/down_request"
up_request_dir = ".data/up_request"

# Process plugins (default: none). Set enabled=true to spawn.
# Preferred package layout (next to bridge.exe):
#   plugins/<id>/info.toml
#   plugins/<id>/<executable>
# Runtime state (registry, credentials) still lives under data_dir/plugins/.
# See docs/plugin-ipc-contract.md
[plugins]
# max_frame_bytes = 0 means follow max_request_body_bytes
max_frame_bytes = 0
max_concurrent_streams = 32
heartbeat_interval_seconds = 5
shutdown_plugin_timeout_seconds = 5
# Restart after unexpected process exit or consecutive heartbeat failures.
auto_restart = true
auto_restart_fail_threshold = 3

# Example: GrokBuild / SuperGrok process plugin (default off)
# Prefer desktop 「发现插件」 from plugins/grokbuild/info.toml, or:
# [plugins.entries.grokbuild]
# enabled = true
# executable = "plugins/grokbuild/plugin-grokbuild.exe"
# data_dir = ".data/plugins/grokbuild"
# admin_enabled = false
