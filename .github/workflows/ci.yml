name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache-dependency-path: |
            go.work.sum
            bridge/go.sum
            common/go.sum
            plugins/mock/go.sum
      - name: Test workspace modules
        run: |
          go work sync
          go test ./common/...
          go test ./bridge/...
          go test ./plugins/mock/...
      - name: Race and vet bridge
        working-directory: bridge
        run: |
          go test -race ./...
          go vet ./...

  desktop-frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache-dependency-path: |
            go.work.sum
            desktop/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json
      - working-directory: desktop/frontend
        run: npm ci
      - working-directory: desktop/frontend
        run: npm run lint
      - working-directory: desktop/frontend
        run: npm run format:check
      - working-directory: desktop/frontend
        run: npm test
      - working-directory: desktop/frontend
        run: npm run build
      - working-directory: desktop
        run: go test .
      - run: npx --yes @redocly/cli@1.34.5 lint docs/openapi.yaml --extends minimal
      - run: .\scripts\Test-OpenAPI.ps1

  package-windows:
    runs-on: windows-latest
    needs: [bridge, desktop-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache-dependency-path: |
            go.work.sum
            bridge/go.sum
            common/go.sum
            desktop/go.sum
            plugins/mock/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
      - run: .\build-all.ps1
      - run: .\scripts\Test-Package.ps1 -PackageDir .\icoo_proxy
      - uses: actions/upload-artifact@v4
        with:
          name: icoo-proxy-windows
          path: |
            icoo_proxy/bridge.exe
            icoo_proxy/icoo_desktop.exe
          if-no-files-found: error
